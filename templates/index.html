<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>약품 재고 체크 - 스마트 대시보드</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- 상단 네비게이션 -->
    <nav class="top-nav">
        <div class="nav-content">
            <div class="nav-brand">
                <i class="bi bi-capsule"></i>
                <span>약품재고 체커</span>
            </div>
            <div class="nav-controls">
                <button id="themeToggle" class="theme-toggle" title="다크모드 전환">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="connection-status">
                    <div id="connectionDot" class="status-dot"></div>
                    <span id="connectionText">연결 확인 중...</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 메인 컨테이너 -->
    <main class="main-container">
        <!-- 대시보드 헤더 -->
        <section class="dashboard-header">
            <h1>실시간 품절 약품 재고 모니터링</h1>
            <p class="subtitle">도매상에서 품절 약품의 상황을 실시간으로 확인하세요</p>
        </section>

        <!-- 컨트롤 패널 -->
        <section class="control-panel">
            <div class="control-card">
                <button id="actionBtn" class="control-btn primary">
                    <i class="bi bi-play-circle"></i>
                    <span>검색 시작</span>
                </button>
            </div>
            
            <!-- 상태 카드들 -->
            <div class="status-grid">
                <div class="status-card">
                    <div class="status-icon">
                        <i class="bi bi-list-ul"></i>
                    </div>
                    <div class="status-content">
                        <h3 id="drugCount">-</h3>
                        <p>검색 대상 약품</p>
                    </div>
                </div>
                
                <div class="status-card">
                    <div class="status-icon">
                        <i class="bi bi-file-earmark-excel"></i>
                    </div>
                    <div class="status-content">
                        <h3 id="excelStatus">-</h3>
                        <p>Excel 데이터</p>
                    </div>
                </div>
                
                <div class="status-card">
                    <div class="status-icon">
                        <i class="bi bi-bell-slash"></i>
                    </div>
                    <div class="status-content">
                        <h3 id="exclusionCount">-</h3>
                        <p>알림 제외</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 검색 결과 섹션 -->
        <section class="results-section">
            <!-- 실시간 로그 -->
            <div class="log-panel">
                <div class="log-header">
                    <h3><i class="bi bi-terminal"></i> 실시간 진행상황</h3>
                    <button id="clearLogBtn" class="clear-btn">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
                <div id="logContainer" class="log-content">
                    <div class="log-placeholder">
                        <i class="bi bi-clock"></i>
                        <span>검색 시작을 기다리는 중...</span>
                    </div>
                </div>
            </div>

            <!-- 결과 대시보드 -->
            <div class="results-dashboard">
                <!-- 결과 요약 -->
                <div class="results-summary">
                    <div class="summary-card success">
                        <div class="summary-icon">
                            <i class="bi bi-check-circle"></i>
                        </div>
                        <div class="summary-content">
                            <h2 id="foundCount">0</h2>
                            <p>재고 발견</p>
                        </div>
                    </div>
                    
                    <div class="summary-card warning">
                        <div class="summary-icon">
                            <i class="bi bi-x-circle"></i>
                        </div>
                        <div class="summary-content">
                            <h2 id="soldoutCount">0</h2>
                            <p>품절</p>
                        </div>
                    </div>
                    
                    <div class="summary-card danger">
                        <div class="summary-icon">
                            <i class="bi bi-exclamation-triangle"></i>
                        </div>
                        <div class="summary-content">
                            <h2 id="errorCount">0</h2>
                            <p>오류</p>
                        </div>
                    </div>
                </div>

                <!-- 상세 결과 -->
                <div class="detailed-results">
                    <div class="results-header">
                        <h3>검색 결과</h3>
                        <div class="last-update">
                            <i class="bi bi-clock-history"></i>
                            <span id="lastUpdate">-</span>
                        </div>
                    </div>
                    <div id="searchResults" class="results-content">
                        <div class="empty-state">
                            <i class="bi bi-search"></i>
                            <h4>아직 검색 결과가 없습니다</h4>
                            <p>검색 버튼을 눌러 약품 재고를 확인해보세요.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 푸터 -->
    <footer class="footer">
        <div class="footer-content">
            <span>© 약품재고체커 by ChaJM</span>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="/static/js/app.js"></script>
</body>
</html>
